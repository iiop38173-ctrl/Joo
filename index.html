<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joodqht | Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        
        /* الحاوية الرئيسية - كل شي بالوسط */
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* الصورة - بالوسط */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.2s;
            display: block;
            margin: 0 auto;
        }
        .avatar:active {
            transform: scale(0.95);
        }
        
        /* الاسم - بالوسط */
        .name {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0 35px;
            cursor: pointer;
            padding: 5px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            text-align: center;
        }
        
        /* الروابط - كلها بالوسط */
        .links-list {
            width: 100%;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .link-card {
            display: block;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            margin: 12px 0;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }
        
        .link-card:active {
            transform: scale(0.97);
            background: #3a3a3a;
        }
        
        /* زر الحذف */
        .delete-link {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 30px;
            width: 28px;
            height: 28px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* الأزرار - بالوسط */
        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .btn {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            margin: 8px 5px;
            cursor: pointer;
            transition: 0.2s;
            width: 90%;
            max-width: 300px;
        }
        
        .btn-primary {
            background: white;
            color: black;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        /* النافذة المنبثقة */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
        }
        
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border-radius: 30px;
            padding: 25px;
            width: 85%;
            max-width: 350px;
            z-index: 1001;
            text-align: center;
            border: 1px solid #333;
        }
        
        .popup h3 {
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .popup input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        
        .popup input:focus {
            outline: none;
            border-color: white;
        }
        
        .popup .btn-popup {
            width: 100%;
            margin-top: 15px;
        }
        
        .hidden {
            display: none;
        }
        
        /* تذييل */
        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- الصورة - بالوسط -->
        <img src="" id="profileImage" class="avatar" onclick="changeImage()">
        
        <!-- الاسم - بالوسط -->
        <div class="name" id="profileName" onclick="editName()">Joodqht</div>
        
        <!-- الروابط - كلها بالوسط -->
        <div id="linksList" class="links-list"></div>
        
        <!-- أزرار التعديل - بالوسط (تظهر لكِ فقط) -->
        <div class="buttons">
            <button class="btn" onclick="showAddPopup()">+ إضافة رابط</button>
            <button class="btn btn-primary" onclick="saveAll()">💾 حفظ</button>
        </div>
        
        <div class="footer">⋮ JOODQHT ⋮</div>
    </div>

    <!-- نافذة إضافة رابط -->
    <div id="popupOverlay" class="overlay hidden"></div>
    <div id="addPopup" class="popup hidden">
        <h3>➕ إضافة رابط</h3>
        <input type="text" id="linkTitle" placeholder="اسم الرابط (مثال: انستقرام)">
        <input type="text" id="linkUrl" placeholder="الرابط (مثال: https://instagram.com/username)">
        <button class="btn btn-primary btn-popup" onclick="addLink()">إضافة</button>
        <button class="btn btn-popup" onclick="closePopup()" style="background:#333;">إلغاء</button>
    </div>

    <script>
        let links = [];
        
        function showAddPopup() {
            document.getElementById('addPopup').classList.remove('hidden');
            document.getElementById('popupOverlay').classList.remove('hidden');
            document.getElementById('linkTitle').value = '';
            document.getElementById('linkUrl').value = '';
        }
        
        function closePopup() {
            document.getElementById('addPopup').classList.add('hidden');
            document.getElementById('popupOverlay').classList.add('hidden');
        }
        
        function addLink() {
            let title = document.getElementById('linkTitle').value.trim();
            let url = document.getElementById('linkUrl').value.trim();
            
            if(!title) {
                alert("✏️ الرجاء إدخال اسم الرابط");
                return;
            }
            if(!url) {
                alert("🔗 الرجاء إدخال الرابط");
                return;
            }
            if(!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            links.push({ title: title, url: url });
            renderLinks();
            closePopup();
            saveAll();
        }
        
        function deleteLink(index) {
            links.splice(index, 1);
            renderLinks();
            saveAll();
        }
        
        function renderLinks() {
            const container = document.getElementById('linksList');
            container.innerHTML = '';
            
            links.forEach((link, i) => {
                const div = document.createElement('div');
                div.style.position = 'relative';
                div.style.width = '100%';
                
                const a = document.createElement('a');
                a.href = link.url;
                a.target = "_blank";
                a.className = "link-card";
                a.innerText = link.title;
                
                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = '✖';
                deleteBtn.className = 'delete-link';
                deleteBtn.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    deleteLink(i);
                };
                
                div.appendChild(a);
                div.appendChild(deleteBtn);
                container.appendChild(div);
            });
            
            if(links.length === 0) {
                container.innerHTML = '<div style="background:#1a1a1a; padding:30px; border-radius:30px; color:#666; text-align:center;">✨ أضيفي رابط جديد ✨</div>';
            }
        }
        
        function changeImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        document.getElementById('profileImage').src = event.target.result;
                        saveAll();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }
        
        function editName() {
            const newName = prompt("✏️ أدخل اسمك:", document.getElementById('profileName').innerText);
            if(newName && newName.trim()) {
                document.getElementById('profileName').innerText = newName.trim();
                saveAll();
            }
        }
        
        function saveAll() {
            localStorage.setItem('jood_name', document.getElementById('profileName').innerText);
            localStorage.setItem('jood_links', JSON.stringify(links));
            localStorage.setItem('jood_avatar', document.getElementById('profileImage').src);
            alert("✅ تم الحفظ!");
        }
        
        function loadAll() {
            const savedName = localStorage.getItem('jood_name');
            if(savedName) document.getElementById('profileName').innerText = savedName;
            
            const savedLinks = localStorage.getItem('jood_links');
            if(savedLinks) {
                try {
                    links = JSON.parse(savedLinks);
                } catch(e) {
                    links = [];
                }
            }
            if(!links || links.length === 0) {
                links = [
                    { title: "انستقرام", url: "https://instagram.com" },
                    { title: "يوتيوب", url: "https://youtube.com" }
                ];
            }
            
            const savedAvatar = localStorage.getItem('jood_avatar');
            if(savedAvatar && savedAvatar !== '' && savedAvatar !== 'undefined') {
                document.getElementById('profileImage').src = savedAvatar;
            } else {
                document.getElementById('profileImage').src = "https://ui-avatars.com/api/?background=ffffff&color=000&size=120&name=J";
            }
            
            renderLinks();
        }
        
        loadAll();
    </script>
</body>
</html>
